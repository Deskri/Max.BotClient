name: CI

on:
  push:
    branches:
      - main
      - dev
  release:
    types:
      - published

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Build
        run: dotnet build src/Max.BotClient/Max.BotClient.csproj -c Release

      - name: Test
        run: dotnet test tests/Max.BotClient.Tests/Max.BotClient.Tests.csproj -c Release --no-build

  publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release'
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Pack
        run: dotnet pack src/Max.BotClient/Max.BotClient.csproj -c Release -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate