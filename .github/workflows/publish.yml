name: Publish to NuGet

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Test
        run: dotnet test tests/Max.BotClient.Tests/Max.BotClient.Tests.csproj -c Release

      - name: Build
        run: dotnet build src/Max.BotClient/Max.BotClient.csproj -c Release

      - name: Pack
        run: dotnet pack src/Max.BotClient/Max.BotClient.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate